# 맞춤 탭(특수 커스텀 탭) 기능 확장 구현 계획

## 요약
기존 `커스텀 탭(+추가)` 기능은 유지하고, 별도의 **특수 맞춤 탭 1개**를 `맞춤 탭 보기 설정`으로 ON/OFF 제어합니다.  
맞춤 탭은 `고객/Contact/History` 카드만 선택해 조합할 수 있고, 카드 추가는 맞춤 탭 내부 상단 드롭다운에서 수행합니다.  
카드 내용 상태는 원본 탭과 **양방향 실시간 동기화**하고, 카드 배치는 맞춤 탭 독립 순서로 유지합니다.

## 확정된 의사결정 반영
1. 진행 방식: `BIG CHANGE`
2. 맞춤 탭 모델: 특수 기능 탭 1개
3. 기존 `+추가(일반 커스텀 탭)`: 유지
4. 맞춤 탭 보기 OFF: 탭 숨김 + 설정 유지
5. 맞춤 탭 이름: 변경 가능, 삭제 불가
6. 카드 선택 UI: 맞춤 탭 내부 상단 드롭다운
7. 카드 중복: 불가
8. 동기화: 내용/편집행동 양방향, 순서는 맞춤 탭 독립
9. 배치 범위: `left/main/right/RNB` 모두 적용
10. 기본값: `맞춤 탭 보기 = OFF`

## Public API / 타입 변경
1. `src/features/referenceSettings/types.ts`
- `ReferenceTabConfig`에 맞춤 탭 식별 필드 추가
- 예: `customTabKind?: 'generic' | 'composite'`
- `ReferenceSettings`에 맞춤 탭 설정 추가
- 예: `compositeTab: { enabled: boolean; tabId: string; cardOrder: string[] }`
- 카드 카탈로그 타입 추가
- 예: `CompositeCardId`, `CompositeCardConfig`

2. `src/features/referenceSettings/api/referenceSettingsApi.ts`
- 저장소 로드 시 마이그레이션 추가
- `compositeTab` 기본값 주입
- `enabled=true`일 때 특수 탭 자동 생성 보장
- `enabled=false`일 때 탭/배치 정보는 보존하되 렌더링 필터로 숨김
- 카드 순서/중복 정합성 보정 유틸 추가

3. `src/components/ContactReferenceArea.tsx`
- 특수 맞춤 탭 렌더링 분기 추가
- 일반 커스텀 탭(`customTabKind='generic'`)은 기존 placeholder 유지
- 탭 목록 생성 시 `enabled` 상태 반영 필터 적용

## 구현 단계

### 1) 맞춤 탭 설정 스키마/마이그레이션
1. `compositeTab` 스키마를 추가하고 기본값은 `enabled=false`, `tabId='custom-composite'`, `cardOrder=[]`로 정의합니다.
2. ON 전환 시 `tabs`에 특수 탭이 없으면 자동 생성합니다.
3. OFF 전환 시 탭 엔트리와 배치값은 유지하고, 화면/설정표 렌더 시만 숨깁니다.
4. 카드 순서 저장 시 중복 카드 ID를 제거합니다.

### 2) 레퍼런스 설정 패널 UI 확장
1. `src/components/ContactReferenceArea/ReferenceSettingsPanel.tsx`에서 `태스크 버튼 설정`과 `레퍼런스 탭 설정` 사이에 `맞춤 탭 보기 설정` 섹션을 추가합니다.
2. UI 패턴은 기존 `RNB 보기 설정`과 동일 토글 구조로 만듭니다.
3. 맞춤 탭 보기 설정이 on 되면 그 아래에 맞춤 탭 이름 입력 필드를 추가해 이름 변경 가능하게 합니다.(보기 설정과 동일한 섹션 안에 이름 설정 기능을 구현하세요.)
4. 레퍼런스 탭 설정 표에서는 특수 맞춤 탭을 `enabled=true`일 때만 노출합니다.
5. 특수 맞춤 탭 행은 삭제 버튼을 숨깁니다.
6. 일반 커스텀 탭 `+추가/삭제`는 기존 동작을 유지합니다.

### 3) 맞춤 탭 콘텐츠 구현
1. `src/components/ContactReferenceArea/CustomTab/CompositeCustomTabContent.tsx`를 신설합니다.
2. 상단에 카드 추가 드롭다운을 두고, 미선택 카드만 보여줍니다.
3. 선택된 카드 목록은 드래그앤드롭으로 순서 변경 가능하게 합니다.
4. 카드 제거 버튼을 제공합니다.
5. 카드 순서는 `compositeTab.cardOrder`에 저장합니다.
6. 카드 목록은 다음 8개만 지원합니다.
- `info.customer-info`
- `info.customer-memo`
- `info.customer-tag`
- `contact.classification-tags`
- `contact.consultation-info`
- `contact.notes-special`
- `history.consultation-history`
- `history.activity-log`

### 4) 카드 상태 실시간 동기화 구조
1. `src/components/SharedReferenceArea/SharedReferenceArea.tsx`를 기준으로 공유 상태를 단일 소스로 관리합니다.
2. 공유 상태는 `고객/Contact/History` 카드의 데이터와 편집 핸들러를 포함합니다.
3. 메인 레퍼런스, 보조 레퍼런스, RNB 오버레이에서 동일 공유 상태를 prop으로 주입합니다.
4. 맞춤 탭 카드와 원본 탭 카드가 동일 상태/핸들러를 사용하게 하여 양방향 실시간 동기화를 보장합니다.
5. 카드 배치 순서는 맞춤 탭 전용 상태로 분리합니다.

### 5) 보조 패널/RNB 완전 호환
1. `left/main/right/RNB` 어디에 배치해도 특수 맞춤 탭이 정상 렌더되게 합니다.
2. `src/components/SharedReferenceArea/SharedReferenceArea.tsx`의 `getTabName`, `getAvailableTabs`를 하드코딩 배열 대신 `referenceSettings.tabs` 기반 동적으로 변경합니다.
3. `src/components/SideTabOverlay.tsx`와 `src/components/RightNavigationBar.tsx`는 특수 맞춤 탭 ID/이름을 인식하도록 보완합니다.
4. OFF 상태에서는 특수 맞춤 탭 배치가 저장되어 있어도 런타임 노출에서 제외하고, ON 시 복원합니다.

### 6) 원본 탭 컴포넌트 제어형 확장
1. `src/components/ContactReferenceArea/InfoTab/InfoTabContent.tsx`
2. `src/features/customerTab/components/CustomerInfoTabContainer.tsx`
3. `src/components/ContactReferenceArea/ContactTab/ContactTabContent.tsx`
4. `src/components/ContactReferenceArea/HistoryTab/HistoryTabContainer.tsx`
- 위 컴포넌트들에 `외부 상태/핸들러 주입`용 optional props를 추가합니다.
- prop 미주입 시 기존 로컬 상태 모드로 동작해 회귀를 막습니다.

## 테스트 케이스 및 검증 시나리오

### 기능 시나리오
1. `맞춤 탭 보기` OFF 기본 진입 시 탭 미노출 확인
2. ON 시 특수 맞춤 탭 1개 자동 생성 확인
3. 이름 변경 후 저장/재진입 시 유지 확인
4. 특수 맞춤 탭 삭제 버튼 미노출 확인
5. 카드 드롭다운에서 8개 카드 선택 가능 확인
6. 같은 카드 재선택(중복) 방지 확인
7. 카드 DnD 순서 변경 후 저장/재진입 유지 확인
8. 원본 탭에서 수정한 내용이 맞춤 탭 카드에 즉시 반영되는지 확인
9. 맞춤 탭 카드에서 수정한 내용이 원본 탭에 즉시 반영되는지 확인
10. `left/right/RNB` 배치에서도 동일 동작 확인
11. OFF 전환 시 특수 맞춤 탭 숨김 확인
12. OFF 후 ON 복귀 시 카드 구성/배치/위치 복원 확인
13. 기존 일반 커스텀 탭 `+추가/삭제` 동작 회귀 없음 확인
14. 기존 탭 순서 DnD 및 레퍼런스 설정 동기화 회귀 없음 확인

### 빌드/정적 검증
1. `npm run lint`
2. `npm run build`

## 가정 및 기본값
1. 특수 맞춤 탭 ID는 고정(`custom-composite`)으로 관리합니다.
2. 맞춤 탭 배치 OFF는 물리 삭제가 아닌 렌더링 숨김입니다.
3. 카드 내용 동기화는 즉시 반영하며, 카드 순서는 맞춤 탭 독립입니다.
4. 일반 커스텀 탭은 기존 placeholder 성격을 유지합니다.
5. 테스트 프레임워크 추가는 이번 범위에서 제외하고, 수동 시나리오 + lint/build로 검증합니다.
